  <div class="title-el">合格実績比較</div>
  <div class="content"><div class="text-block"><div>実績の透明性という観点で分類すると、英進館（中高大すべて）・早稲田スクール（中学受験・高校受験）・熊本ゼミナール（中高大すべて）は公式サイトでテキストとして具体的な数値を確認できました。一方、全教研・能開センター・早稲田スクール（大学受験のみ）は合格実績が画像形式で抽出できず、創研学院の九州地区実績は年度不明の断片的情報にとどまりました。智翔館（中学受験・大学受験）・九大進学ゼミ（大学受験）は第三者サイト経由の過去年度情報のみで、直近年度の一次情報は確認できませんでした。</div></div></div>
