  <div class="content"><div class="text-block"><div>8社とも公式サイトでは詳細料金を一律公開しておらず、上記は比較サイトの集計値が主な情報源であるため正確性には限界があります。料金満足度が判明している4社の中では英進館が最も低く、「高い」という評判が最も強く見られました。智翔館・熊本ゼミナール・能開センターは中学生・高校生の月謝が非公開で、小学生の一部のみ判明という情報の非対称性がありました。季節講習費の具体的な金額は8社とも確認できませんでした。</div></div></div>
