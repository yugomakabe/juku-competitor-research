  <div class="content"><div class="text-block"><div>8社中7社が集団指導・個別指導・映像/オンライン授業を組み合わせたマルチブランド展開を行っています。映像授業の提携先で見ると、英進館・智翔館・早稲田スクール（高校部）・能開センター（一部拠点）は東進系の映像授業を導入している一方、熊本ゼミナールは河合塾マナビスと提携しています。全教研・九大進学ゼミ・創研学院は自社開発のAI教材（それぞれkulumo、AI学トレ、kulumo）を軸にしています。AI教材の導入状況では、atama+が英進館・能開センター・早稲田スクールで、すららが英進館・創研学院（kulumo経由）で確認できました。</div></div></div>
