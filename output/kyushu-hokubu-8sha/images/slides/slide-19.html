  <div class="title-el">合格実績比較（続き 1）</div>
  <div class="content"><div class="text-block"><div>力点の置き方も各社で異なります。英進館は中学受験から国公立大学まで全区分で圧倒的な実績を公式に打ち出しています。早稲田スクールは「熊本高校・済々黌高校合格者数39年連続県内No.1」を前面に押し出しており、高校受験特化の色が強い塾です。熊本ゼミナールも中高大全区分で実績を公開していますが、地元公立上位校（済々黌・第一・第二高校）への実績が目立ちます。智翔館は高校受験（地元佐世保エリア）に実績の重心があり、創研学院の九州3校舎の実績は8社中最も透明性が低い状況でした。全教研・能開センター・創研学院・九大進学ゼミの直近年度の具体的な合格者数は確認できませんでした。</div></div></div>
