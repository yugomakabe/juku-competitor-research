  <div class="title-el">合格実績比較（続き 2）</div>
  <div class="content"><div class="text-block"><div>実績の透明性という観点では、英進館・森田修学館は具体的人数を公式サイトで確認できた一方、全教研は画像形式で不明瞭、九大進学ゼミは大学受験の最新実績が未公開でした。力点の置き方も異なり、英進館は中学受験から大学受験まで全区分に強みを持つのに対し、森田修学館は中学受験・高校受験特化（大学受験実績なし）、九大進学ゼミ・全教研は相対的に高校受験に力点が置かれている様子がうかがえます。全教研・九大進学ゼミの最新年度の具体的な合格者数・学校別内訳は確認できませんでした。</div></div></div>
